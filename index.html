<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEALDON</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00b32c;
    --green-dark: #003b0e;
    --red-blood: #8b0000;
    --red-bright: #cc0000;
    --red-drip: #ff0000;
    --bg: #000000;
    --cyan: #00ffff;
    --white-dim: #cccccc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: none;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed;
    width: 16px; height: 16px;
    border: 1px solid var(--green);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform .08s;
    box-shadow: 0 0 8px var(--green);
  }
  #cursor::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 4px; height: 4px;
    background: var(--green);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px var(--green);
  }

  /* ── Matrix rain canvas ── */
  #matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.13;
    z-index: 0;
  }

  /* ── Scanlines overlay ── */
  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
  }

  /* ── Vignette ── */
  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 40%,
      rgba(0,0,0,0.85) 100%
    );
  }

  /* ── Glitch noise overlay ── */
  #noise {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px;
  }

  /* ── Main stage ── */
  #stage {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Terminal frame ── */
  #terminal {
    position: relative;
    border: 1px solid var(--green-dim);
    padding: 48px 64px 52px;
    background: rgba(0, 10, 3, 0.7);
    backdrop-filter: blur(2px);
    box-shadow:
      0 0 0 1px rgba(0,255,65,0.08),
      0 0 40px rgba(0,255,65,0.08),
      inset 0 0 60px rgba(0,0,0,0.5);
    min-width: 540px;
    text-align: center;
    animation: terminalIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 0.3s;
    opacity: 0;
  }

  @keyframes terminalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  /* corner brackets */
  #terminal::before,
  #terminal::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--cyan);
    border-style: solid;
  }
  #terminal::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
  }
  #terminal::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
  }

  /* top bar */
  .term-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(0,255,65,0.04);
    border-bottom: 1px solid rgba(0,255,65,0.15);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
  }
  .term-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green-dim);
    opacity: 0.5;
  }
  .term-title {
    font-size: 10px;
    color: rgba(0,255,65,0.4);
    letter-spacing: 3px;
    margin-left: 8px;
  }

  /* ── Name ── */
  #name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(42px, 6vw, 72px);
    letter-spacing: 14px;
    color: var(--green);
    text-shadow:
      0 0 10px var(--green),
      0 0 30px rgba(0,255,65,0.4),
      0 0 60px rgba(0,255,65,0.15);
    position: relative;
    animation: nameIn 0.8s ease both;
    animation-delay: 0.9s;
    opacity: 0;
  }
  @keyframes nameIn {
    from { opacity: 0; letter-spacing: 28px; }
    to   { opacity: 1; letter-spacing: 14px; }
  }

  /* glitch effect on name */
  #name::before,
  #name::after {
    content: 'HEALDON';
    position: absolute;
    top: 0; left: 0; right: 0;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: inherit;
    letter-spacing: 14px;
  }
  #name::before {
    color: var(--cyan);
    animation: glitch1 4s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  }
  #name::after {
    color: #ff0080;
    animation: glitch2 4s infinite;
    clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  }
  @keyframes glitch1 {
    0%,92%,100% { transform: translate(0); opacity: 0; }
    93%          { transform: translate(-3px, 1px); opacity: 0.7; }
    95%          { transform: translate(3px, -1px); opacity: 0.7; }
    97%          { transform: translate(-2px, 0); opacity: 0.5; }
    99%          { transform: translate(0); opacity: 0; }
  }
  @keyframes glitch2 {
    0%,92%,100% { transform: translate(0); opacity: 0; }
    94%          { transform: translate(3px, 1px); opacity: 0.6; }
    96%          { transform: translate(-3px, -1px); opacity: 0.6; }
    98%          { transform: translate(2px, 0); opacity: 0.4; }
    99%          { transform: translate(0); opacity: 0; }
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(0,255,65,0.5) 20%,
      rgba(0,255,65,0.5) 80%,
      transparent
    );
    margin: 24px 0;
    animation: fadeIn 0.5s ease both;
    animation-delay: 1.4s;
    opacity: 0;
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* ── Subtitle line ── */
  #subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 1.5vw, 14px);
    color: rgba(0,255,65,0.45);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fadeIn 0.5s ease both;
    animation-delay: 1.5s;
    opacity: 0;
    margin-bottom: 32px;
  }

  /* ── Statement ── */
  #statement {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px, 1.8vw, 16px);
    color: var(--white-dim);
    letter-spacing: 2px;
    line-height: 2;
    animation: fadeIn 0.6s ease both;
    animation-delay: 1.8s;
    opacity: 0;
  }

  /* "Nothing Because of" */
  .nothing {
    color: rgba(200,200,200,0.7);
  }

  /* ── Islamic Republic wrapper ── */
  #ir-wrap {
    position: relative;
    display: inline-block;
    white-space: nowrap;
  }

  /* text itself */
  #ir-text {
    color: var(--red-blood);
    text-shadow:
      0 0 8px rgba(139,0,0,0.8),
      0 0 20px rgba(139,0,0,0.4);
    position: relative;
    z-index: 2;
    animation: irPulse 3s ease-in-out infinite;
  }
  @keyframes irPulse {
    0%,100% { text-shadow: 0 0 8px rgba(139,0,0,0.8), 0 0 20px rgba(139,0,0,0.4); }
    50%      { text-shadow: 0 0 14px rgba(200,0,0,1),  0 0 35px rgba(139,0,0,0.7); }
  }

  /* ── Blood drips container ── */
  #blood-container {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    height: 160px;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }

  .drip {
    position: absolute;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--red-blood) 0%, var(--red-drip) 60%, transparent 100%);
    border-radius: 0 0 3px 3px;
    transform-origin: top center;
    animation: dripFall linear infinite;
    opacity: 0.85;
  }

  /* drip bulb at bottom */
  .drip::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 7px; height: 7px;
    background: var(--red-drip);
    border-radius: 50% 50% 60% 60%;
    box-shadow: 0 0 6px var(--red-blood);
  }

  @keyframes dripFall {
    0%   { height: 0px;   opacity: 0; }
    10%  { opacity: 0.85; }
    80%  { opacity: 0.85; }
    100% { height: var(--drip-h); opacity: 0; }
  }

  /* ── Cursor blink ── */
  .blink {
    display: inline-block;
    width: 10px; height: 16px;
    background: var(--green);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
    box-shadow: 0 0 6px var(--green);
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Bottom bar ── */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(0,255,65,0.03);
    border-top: 1px solid rgba(0,255,65,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 20;
    animation: fadeIn 0.5s ease both;
    animation-delay: 2.2s;
    opacity: 0;
  }
  .bar-text {
    font-size: 10px;
    color: rgba(0,255,65,0.3);
    letter-spacing: 2px;
  }
  #clock {
    color: rgba(0,255,65,0.45);
    font-size: 10px;
    letter-spacing: 2px;
  }

  /* ── Top-left coordinates ── */
  #coords {
    position: fixed;
    top: 16px; left: 20px;
    font-size: 10px;
    color: rgba(0,255,65,0.25);
    letter-spacing: 2px;
    z-index: 20;
    line-height: 1.8;
    animation: fadeIn 0.5s ease both;
    animation-delay: 2s;
    opacity: 0;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="matrix-canvas"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="noise"></div>

<div id="coords">
  SYS://HEALDON.IR<br>
  LAT: 51.1789° N<br>
  LON: 01.8262° W
</div>

<div id="stage">
  <div id="terminal">
    <div class="term-bar">
      <div class="term-dot"></div>
      <div class="term-dot"></div>
      <div class="term-dot"></div>
      <span class="term-title">root@healdon ~ $</span>
    </div>

    <div id="name">HEALDON</div>

    <div class="divider"></div>

    <div id="subtitle">// System Online //</div>

    <div id="statement">
      <span class="nothing">Nothing Because of </span><br>
      <span id="ir-wrap">
        <span id="ir-text">Islamic Republic</span>
        <div id="blood-container"></div>
      </span>
      <span class="blink"></span>
    </div>
  </div>
</div>

<div id="bottom-bar">
  <span class="bar-text">HEALDON.IR — v1.0.0</span>
  <span id="clock"></span>
  <span class="bar-text">STATUS: ONLINE</span>
</div>

<script>
// ── Cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ── Clock ──
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Matrix rain ──
const canvas = document.getElementById('matrix-canvas');
const ctx    = canvas.getContext('2d');
let cols, drops;

function initMatrix() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const fontSize = 14;
  cols = Math.floor(canvas.width / fontSize);
  drops = Array(cols).fill(1);
}
initMatrix();
window.addEventListener('resize', initMatrix);

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>{}[]|/\\';

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px Share Tech Mono, monospace';
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    const x = i * 14;
    ctx.fillStyle = Math.random() > 0.95 ? '#ffffff' : '#00ff41';
    ctx.fillText(char, x, y * 14);
    if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 50);

// ── Blood drips ──
const container = document.getElementById('blood-container');
const irWrap    = document.getElementById('ir-wrap');

function createDrip() {
  const d   = document.createElement('div');
  d.className = 'drip';
  const w   = irWrap.offsetWidth;
  const x   = Math.random() * (w - 6);
  const h   = 40 + Math.random() * 110;
  const dur = 1.8 + Math.random() * 2.5;
  const del = Math.random() * 3;
  d.style.left              = x + 'px';
  d.style.setProperty('--drip-h', h + 'px');
  d.style.animationDuration = dur + 's';
  d.style.animationDelay    = del + 's';
  d.style.width             = (2 + Math.random() * 2.5) + 'px';
  container.appendChild(d);
  // remove and re-add to loop naturally
  setTimeout(() => {
    d.remove();
    createDrip();
  }, (dur + del + 0.5) * 1000);
}

// start 8 drips with staggered delays
window.addEventListener('load', () => {
  setTimeout(() => {
    for (let i = 0; i < 8; i++) {
      setTimeout(createDrip, i * 400);
    }
  }, 2200);
});

// ── Occasional screen flicker ──
function flicker() {
  const stage = document.getElementById('stage');
  stage.style.opacity = '0.85';
  setTimeout(() => { stage.style.opacity = '1'; }, 60);
  setTimeout(() => { stage.style.opacity = '0.92'; }, 100);
  setTimeout(() => { stage.style.opacity = '1'; }, 140);
  setTimeout(flicker, 8000 + Math.random() * 12000);
}
setTimeout(flicker, 4000);
</script>
</body>
</html>
